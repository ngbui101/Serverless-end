apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cadvisor
  namespace: serverless
  labels:
    app: cadvisor
spec:
  selector:
    matchLabels:
      app: cadvisor
  template:
    metadata:
      labels:
        app: cadvisor
    spec:
      hostNetwork: true
      automountServiceAccountToken: false
      tolerations:
        - operator: Exists
      containers:
        - name: cadvisor
          image: gcr.io/cadvisor/cadvisor:v0.49.1
          imagePullPolicy: IfNotPresent
          args:
            - --port=30181
            - --housekeeping_interval=10s
            - --docker_only=false
            - --store_container_labels=true
          securityContext:
            privileged: true
          ports:
            - name: http
              containerPort: 30181
              hostPort: 30181
          volumeMounts:
            - name: rootfs
              mountPath: /rootfs
              readOnly: true
            - name: var-run
              mountPath: /var/run
              readOnly: true
            - name: sys
              mountPath: /sys
              readOnly: true
            - name: docker
              mountPath: /var/lib/docker
              readOnly: true
            - name: containerd
              mountPath: /var/lib/containerd
              readOnly: true
            - name: k3s-containerd
              mountPath: /var/lib/rancher/k3s/agent/containerd
              readOnly: true
      volumes:
        - name: rootfs
          hostPath:
            path: /
        - name: var-run
          hostPath:
            path: /var/run
        - name: sys
          hostPath:
            path: /sys
        - name: docker
          hostPath:
            path: /var/lib/docker
        - name: containerd
          hostPath:
            path: /var/lib/containerd
        - name: k3s-containerd
          hostPath:
            path: /var/lib/rancher/k3s/agent/containerd
