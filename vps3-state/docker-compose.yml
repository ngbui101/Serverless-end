services:
  postgres:
    image: postgres:15-alpine
    container_name: vps3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: vps3-minio
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: server /data --address ":${MINIO_S3_PORT}" --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PROMETHEUS_AUTH_TYPE: "public"
    ports:
      - "${MINIO_S3_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: vps3-minio-init
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_started
    entrypoint: ["/bin/sh", "/bootstrap/init.sh"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_BUCKET_RAW_CLASSIC: images-raw-classic
      MINIO_BUCKET_RAW_SERVERLESS: images-raw-serverless
      MINIO_BUCKET_PROCESSED: images-processed
      MINIO_NOTIFY_WEBHOOK_VPS1: ${MINIO_NOTIFY_WEBHOOK_VPS1}
      VPS1_NATS_ADDRESS: ${VPS1_NATS_ADDRESS:-92.5.54.80:4222}
      SERVERLESS_EVENT_TARGET: ${SERVERLESS_EVENT_TARGET:-keda}
      MINIO_NOTIFY_NATS_ADDRESS: ${MINIO_NOTIFY_NATS_ADDRESS:-host.docker.internal:4222}
      MINIO_NOTIFY_NATS_SUBJECT: ${MINIO_NOTIFY_NATS_SUBJECT:-minio.images.raw.serverless}
      MINIO_NOTIFY_NATS_QUEUE_DIR: ${MINIO_NOTIFY_NATS_QUEUE_DIR:-/tmp/minio-nats-events}
      MINIO_NOTIFY_NATS_QUEUE_LIMIT: ${MINIO_NOTIFY_NATS_QUEUE_LIMIT:-100000}
    volumes:
      - ./minio/init.sh:/bootstrap/init.sh:ro

  prometheus:
    image: prom/prometheus:v3.0.0
    container_name: vps3-prometheus
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - minio-init
    entrypoint: ["/bin/sh", "/etc/prometheus/render-and-run.sh"]
    environment:
      PROMETHEUS_PORT: ${PROMETHEUS_PORT}
      VPS1_METRICS_TARGET: ${VPS1_METRICS_TARGET}
      VPS1_NODE_EXPORTER_TARGET: ${VPS1_NODE_EXPORTER_TARGET}
      VPS2_NODE_EXPORTER_TARGET: ${VPS2_NODE_EXPORTER_TARGET}
      VPS3_NODE_EXPORTER_TARGET: ${VPS3_NODE_EXPORTER_TARGET}
      VPS1_CADVISOR_TARGET: ${VPS1_CADVISOR_TARGET}
      VPS2_CADVISOR_TARGET: ${VPS2_CADVISOR_TARGET}
      K3S_KUBE_STATE_METRICS_TARGET: ${K3S_KUBE_STATE_METRICS_TARGET:-host.docker.internal:30180}
      K3S_CADVISOR_TARGET: ${K3S_CADVISOR_TARGET:-host.docker.internal:30181}
      K3S_KUBELET_TARGET: ${K3S_KUBELET_TARGET:-host.docker.internal:10250}
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus/render-and-run.sh:/etc/prometheus/render-and-run.sh:ro
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - ./prometheus/k3s-prometheus.token:/etc/prometheus/k3s-prometheus.token:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    container_name: vps3-grafana
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_DEFAULT_LANGUAGE=de-DE
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data:
