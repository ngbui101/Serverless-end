services:
  app:
    build:
      context: .
    container_name: vps1-microservice
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 256m
    env_file:
      - .env
    environment:
      - OTEL_SERVICE_NAME=vps1-microservice
    ports:
      - "${APP_PORT}:8080"

  nats:
    image: nats:alpine
    container_name: vps1-nats
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js"]

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.9.0
    container_name: vps1-node-exporter
    restart: unless-stopped
    network_mode: host
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: vps1-cadvisor
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
    command:
      - "-containerd=/run/containerd/containerd.sock"
      - "-containerd-namespace=moby"
    ports:
      - "8082:8080"
