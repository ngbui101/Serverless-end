name: Deploy Serverless Go Worker on VPS3

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'vps2-serverless/**'
      - '.github/workflows/deploy-vps2.yml'

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test Go worker
        working-directory: vps2-serverless/image-process-worker
        run: go test ./...

      - name: Copy serverless files to VPS3
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS3_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS3_SSH_KEY }}
          source: "vps2-serverless/*"
          target: "~/"

      - name: Install k3s/KEDA and deploy Go worker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS3_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS3_SSH_KEY }}
          script: |
            set -euo pipefail

            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io docker-compose-plugin
              sudo usermod -aG docker ubuntu || true
              sudo systemctl enable --now docker
              sudo chmod 666 /var/run/docker.sock || true
            fi

            if ! command -v kubectl >/dev/null 2>&1 || ! systemctl is-active --quiet k3s; then
              curl -sfL https://get.k3s.io | sudo sh -s - --write-kubeconfig-mode 644
            fi
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml

            until [ "$(kubectl get nodes --no-headers 2>/dev/null | wc -l)" -gt 0 ]; do
              sleep 3
            done
            kubectl wait --for=condition=Ready nodes --all --timeout=180s

            if ! command -v helm >/dev/null 2>&1; then
              curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
            fi
            helm repo add kedacore https://kedacore.github.io/charts >/dev/null 2>&1 || true
            helm repo update
            helm upgrade --install keda kedacore/keda --namespace keda --create-namespace
            kubectl -n keda rollout status deploy/keda-operator --timeout=180s

            if ! docker ps --format '{{.Names}}' | grep -qx local-registry; then
              docker rm -f local-registry >/dev/null 2>&1 || true
              docker run -d --restart unless-stopped --name local-registry -p 127.0.0.1:5000:5000 registry:2
            fi

            cd ~/vps2-serverless
            test -s .env

            chmod +x ./k8s/deploy-keda-worker.sh
            ./k8s/deploy-keda-worker.sh
