name: Deploy Load Tester to VPS2

on:
  push:
    branches:
      - master
    paths:
      - 'load-testing/**'
      - '.github/workflows/deploy-loadtest.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS2_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS2_SSH_KEY }}
          source: "load-testing/*"
          target: "/home/ubuntu/serverless-benchmark"
          strip_components: 0

      - name: Build and deploy on VPS2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS2_HOST }}
          username: ubuntu
          key: ${{ secrets.VPS2_SSH_KEY }}
          script: |
            cd /home/ubuntu/serverless-benchmark/load-testing
            cp -n .env.example .env || true
            docker compose up -d --build
